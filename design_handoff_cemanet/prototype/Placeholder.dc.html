<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:100%; height:100%; min-height:120px; display:flex; align-items:center; justify-content:center; background-color:#ece7d6; background-image:repeating-linear-gradient(45deg, rgba(78,68,131,0.06) 0, rgba(78,68,131,0.06) 1px, transparent 1px, transparent 11px); overflow:hidden;">
  <span style="font-family:'Roboto Mono',ui-monospace,Menlo,monospace; font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color:#6a6285; background:rgba(255,255,255,0.72); padding:5px 9px; border-radius:3px; white-space:nowrap;">{{ label }}</span>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:280,&quot;height&quot;:180},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;imagem&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
